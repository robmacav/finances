services:
  db:
    image: postgres
    container_name: finances_db
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  app:
    build: .
    container_name: finances_app
    volumes:
      - .:/app
    depends_on:
      - db